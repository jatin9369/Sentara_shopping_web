services:
  - type: web
    name: sentara-shop
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        value: sentara_jwt_secret_2024
      - key: ALLOWED_ORIGINS
        value: https://sentara-shop.onrender.com
